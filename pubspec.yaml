name: news_app
description: "NewsWave — A premium Flutter news application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <3.9.0"

dependencies:
  cached_network_image: ^3.4.1
  crypto: ^3.0.7
  cupertino_icons: ^1.0.8
  device_preview: ^1.2.0
  dio: ^5.9.1
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.1
  flutter_localizations:
    sdk: flutter
  flutter_test:
    sdk: flutter
  gap: ^3.0.1
  get_it: ^9.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.6.0
  image_picker: 1.2.1
  intl: ^0.19.0
  persistent_bottom_nav_bar_v2: ^6.3.0
  retrofit: ^4.6.0
  share_plus: 12.0.2
  shared_preferences: ^2.3.2
  supabase_flutter: ^2.12.4
  webview_flutter: 4.13.0

dev_dependencies:
  analyzer: 6.4.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  retrofit_generator: ^8.1.0
  source_gen: ^1.4.0

flutter:

  generate: true
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/images/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Cairo
      fonts:

        - asset: assets/fonts/Cairo/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo/Cairo-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icons/icon_1024x1024.png"
